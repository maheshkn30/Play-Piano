<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play-Piano</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #4dabf7;
        cursor: pointer;
      }

      .main {
        background-color: rgb(38, 37, 37);
        width: 90%;
        height: 60vh;
        margin: 95px 70px 50px;
        display: flex;
        align-items: end;
        gap: 10px;
        padding-bottom: 3px;
        padding-inline: 15px;
        border-radius: 8px;
      }

      .sub {
        background-color: rgb(240, 243, 243);
        width: 18%;
        height: 80%;
        border-bottom-left-radius: 10px;
        border-bottom-right-radius: 10px;
        gap: 10px;
      }
      .sub-group {
        background-color: rgb(240, 243, 243);
        width: 25%;
        height: 80%;
        border-bottom-left-radius: 10px;
        border-bottom-right-radius: 10px;
        gap: 10px;
      }

      .main-child {
        background-color: white;
        width: 100%;
        height: 50%;
        display: flex;
        justify-content: space-evenly;
      }

      .child {
        background-color: rgb(1, 1, 1);
        width: 20%;
        height: 100%;
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
      }
      .sub-child {
        background-color: white;
        width: 100%;
        height: 50%;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        gap: 15px;
        border-bottom-left-radius: 10px;
        border-bottom-right-radius: 10px;
      }

      .child1 {
        background-color: rgb(1, 1, 1);
        width: 2%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <h1
      style="
        text-align: center;
        font-size: 64px;
        font-style: oblique;
        font-family: Arial, Helvetica, sans-serif;
        color: aliceblue;
        margin-top: 5px;
      "
    >
      Play Piano
    </h1>
    <div class="main">
      <div class="sub">
        <div class="main-child">
          <div class="child"></div>
          <div class="child"></div>
        </div>

        <div class="sub-child">
          <div class="child1"></div>
          <div class="child1"></div>
        </div>
      </div>
      <div class="sub-group">
        <div class="main-child">
          <div class="child"></div>
          <div class="child"></div>
          <div class="child"></div>
        </div>
        <div class="sub-child">
          <div class="child1"></div>
          <div class="child1"></div>
          <div class="child1"></div>
        </div>
      </div>
      <div class="sub">
        <div class="main-child">
          <div class="child"></div>
          <div class="child"></div>
        </div>
        <div class="sub-child">
          <div class="child1"></div>
          <div class="child1"></div>
        </div>
      </div>
      <div class="sub-group">
        <div class="main-child">
          <div class="child"></div>
          <div class="child"></div>
          <div class="child"></div>
        </div>
        <div class="sub-child">
          <div class="child1"></div>
          <div class="child1"></div>
          <div class="child1"></div>
        </div>
      </div>

      <div class="sub">
        <div class="main-child">
          <div class="child"></div>
          <div class="child"></div>
        </div>
        <div class="sub-child">
          <div class="child1"></div>
          <div class="child1"></div>
        </div>
      </div>
    </div>

    <p
      style="
        text-align: center;
        font-size: 25px;
        font-style: oblique;
        margin-top: -20px;
        font-family: Georgia, 'Times New Roman', Times, serif, Helvetica,
          sans-serif;
        color: aliceblue;
      "
    >
      Click on Any Key to Play the music
    </p>

    <script>
      const keys = document.querySelectorAll(".sub-group,.child1");
      const keyss = document.querySelectorAll(" .sub,.child1");

      keys.forEach((key) => {
        key.addEventListener("click", function () {
          const audio = new Audio("sounds/f6-102819.mp3");
          audio.volume = 1;
          audio.play();
        });
      });
      keyss.forEach((key) => {
        key.addEventListener("click", function () {
          const audio = new Audio("sounds/c6-102822.mp3");
          audio.volume = 1;
          audio.play();
        });
      });
    </script>
  </body>
</html>
